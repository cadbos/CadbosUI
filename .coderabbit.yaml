# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit configuration for Cadbos Interior Design AI.
# Tuned to AGENTS.md (single source of truth for agents) and the .claude/skills/
# cadbos-* skills — those skills are the canonical rules. Keep this file in sync
# with them.

language: en-US
tone_instructions: >
  You are a strict but constructive reviewer for Cadbos (Svelte 5 runes +
  SvelteKit). Enforce AGENTS.md and the cadbos-* skills. Object on substance and
  cite the specific rule. Never propose or approve temporary/"for now"/workaround
  solutions.

early_access: false
enable_free_tier: true

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  high_level_summary_in_walkthrough: false
  auto_title_placeholder: "@coderabbitai"
  review_status: true
  commit_status: true
  poem: false
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  auto_apply_labels: false
  suggested_reviewers: true
  abort_on_close: true

  # Skip generated / vendored / non-source content from review noise.
  path_filters:
    - "!**/pnpm-lock.yaml"
    - "!**/package-lock.json"
    - "!**/.svelte-kit/**"
    - "!**/build/**"
    - "!**/dist/**"
    - "!**/node_modules/**"
    - "!**/coverage/**"
    - "!**/*.min.js"
    - "!**/*.min.css"
    - "!**/playwright-report/**"
    - "!**/test-results/**"
    # ai-context is a read-only, git-ignored knowledge base — not part of the repo.
    - "!ai-context/**"

  path_instructions:
    - path: "**/*.svelte"
      instructions: >
        Svelte 5 runes ONLY. Flag any Svelte 4 syntax as a blocking issue:
        on:click (use onclick), export let (use $props()), <slot>
        (use snippets / {@render}), $: reactive statements (use $derived
        / $effect), createEventDispatcher. Components are projections of the
        shared store — flag local "shadow" state that duplicates store data.
        Prefer $derived over $effect for computed values; the final prompt
        must be derived, never imperatively synced across views. All user-visible
        text must go through the i18n layer — flag hardcoded UI strings.
        Comments policy: AI-oriented anchor comments are welcome and encouraged
        (section markers like // === Prompt assembly ===, intent labels like
        // Intent: normalize before hashing, // TODO: #<issue>). Flag only
        comments that restate what the code obviously does, contain outdated or
        misleading information, or include bare TODO/FIXME/HACK without a
        referenced issue. Never flag comments that serve as navigation anchors
        or context for AI agents. Do NOT flag or remove commented-out code if
        it is clearly marked as a reference anchor for AI context — flag it only
        if it is dead code with no explanatory label.
        Components must be a11y-correct (keyboard, ARIA roles/labels, contrast;
        WCAG 2.1 AA target). Every .svelte is expected to pass svelte-autofixer
        with zero findings.
    - path: "**/*.svelte.ts"
      instructions: >
        Reactive store modules. src/lib/state/*.svelte.ts is the SINGLE source
        of truth for the request model. Flag duplicated/shadow state in views.
        prompt must be $derived from promptFragments[] by order
        (key-value/graph) or built from the dialog (chat) — flag imperative
        synchronization of prompt across views. Mutations go through the store
        API only. Determinism is required: identical content entered in any view
        must serialize to a byte-identical prompt and an identical request
        payload (the three-UI identity guarantee).
        Comments policy: same as **/*.ts below.
    - path: "src/lib/server/**"
      instructions: >
        SERVER-ONLY code. Provider secrets (render-service x-api-key, the upload
        token) MUST NOT be importable from, or leak into, the client bundle,
        traffic, logs, or error messages. Use $env/static/private /
        $env/dynamic/private. Flag any PUBLIC_-prefixed env holding a
        key/token/secret. Validate & sanitize all input server-side with schema
        validation (Zod/Valibot) before processing — never trust client
        validation alone. Authenticate the session before any mutation and
        authorize at the data layer (quota keyed by pubkey). Map external errors
        to generic client messages; log detail server-side without secrets/PII.
    - path: "src/lib/server/generation.ts"
      instructions: >
        Render-service proxy (interior render + edit-by-prompt). The API key is
        injected server-side only. Synchronous call with a configurable timeout
        (default 120s). Retry ONLY when there is no confirmed response
        (network/5xx/timeout) — every successful call charges cost; guard
        against double-submit. Normalize both output shapes: array for the
        render endpoint (use output[0]), string for edit-by-prompt. image
        must be a public URL (base64 unsupported). Never forward provider secrets
        or raw provider errors to the client.
    - path: "src/lib/server/auth.ts"
      instructions: >
        Nostr authentication — NO passwords, NO nsec import. Verify a single-use,
        short-TTL challenge signed as a NIP-98 event (kind 27235): check kind,
        time window, u/method tags, one-time nonce use, and the schnorr
        signature strictly against the pubkey INSIDE the signed event — never a
        "trusted" request field. The private key must never reach the server,
        bundle, or logs. Establish a server-side session behind an HttpOnly,
        Secure, SameSite=Lax|Strict cookie — never localStorage. Rate-limit
        auth endpoints. Flag any code path that accepts or stores a password or
        private key.
    - path: "src/lib/server/billing.ts"
      instructions: >
        Cost/limit accounting. A charge must be tied to a CONFIRMED
        generation/edit and protected against double-charge. Reconcile with the
        provider cost. Quota/limits are keyed to the authenticated account
        (pubkey) and must BLOCK generation/edit when exhausted.
    - path: "src/routes/api/**/+server.ts"
      instructions: >
        SvelteKit server endpoints (render proxy, upload route, auth, limits).
        External services are reached ONLY through these endpoints — the client
        never holds provider keys. Authenticate before any mutating action; keep
        SvelteKit csrf.checkOrigin on. Validate input server-side. For the
        upload route, enforce type image, max 8 MB, count 1.
    - path: "src/lib/i18n/**"
      instructions: >
        Russian is the primary language; the architecture must stay
        English-ready. Flag missing keys referenced by components and hardcoded
        strings that bypass this layer.
    - path: "**/*.ts"
      instructions: >
        TypeScript strict. Flag any, non-null assertions hiding real
        nullability, and missing explicit return types on exported/public APIs.
        Use the $lib alias for app imports. No "temporary"/"for now"/"workaround"
        code and no bare TODO/FIXME/HACK without a referenced issue. No single-use
        abstractions or Enhanced*/*V2 wrappers.
        Comments policy: AI-oriented anchor comments are welcome and encouraged —
        section markers (e.g. // === Auth flow ===), intent labels
        (e.g. // Intent: deduplicate before hashing), and
        // TODO: #<issue> are all valid and must not be flagged. Flag only
        comments that (a) restate what the code obviously does word-for-word,
        (b) contain stale or misleading information, or (c) are bare
        TODO/FIXME/HACK without a referenced issue number. Never flag comments
        whose purpose is to orient an AI agent navigating the file.
    - path: "**/*.{test,spec}.ts"
      instructions: >
        Tests must mock the provider boundary — never call real external services.
        Use Vitest only for narrow pure logic (derived prompt concatenation, model
        serialization/normalization, graph↔key-value mapping); user-visible flows
        belong in Playwright e2e. The three-UI identity scenario must stay covered.
    - path: "**/*.{yml,yaml}"
      instructions: >
        Validate CI/workflow and config YAML. Flag secrets committed in plaintext
        and over-broad permissions.

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    ignore_title_keywords:
      - "wip"
      - "[skip ci]"
    base_branches:
      - "main"
      - "master"

  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false

  pre_merge_checks:
    custom_checks:
      - mode: error
        name: License headers
        instructions: >
          Verify that every source file created or modified by the PR has the
          required file-level license notice from docs/license-headers. Use
          docs/license-headers/README.md as the policy source, and compare
          against the appropriate template for each file type:
          docs/license-headers/block-comment.txt for .ts, .js, .css, .scss,
          .sql, .jsonc, .cjs, and .mjs; docs/license-headers/html-comment.txt
          for .svelte, .html, .svg, and .xml; docs/license-headers/line-comment.txt
          for .sh, .yml, .yaml, .toml, .env.example, and extensionless scripts.
          For line-comment formats, require the same legal notice text using the
          file type's valid line-comment marker. For executable scripts with a
          shebang, require the line-comment header immediately after the shebang.
          Exclude documentation, generated files, lockfiles, vendored third-party
          files, binary assets, and files that already carry a different
          third-party license notice. Fail this check if any required header is
          missing, incomplete, uses a different SPDX identifier, appears after
          source code, or uses an invalid comment style for the file type.

  tools:
    # JS/TS/Svelte linting & formatting — respect project config when present.
    eslint:
      enabled: true
    biome:
      enabled: true
    # Secret scanning — secrets must never reach VCS or the client.
    gitleaks:
      enabled: true
    # Static analysis for security smells (SSRF, injection, auth).
    semgrep:
      enabled: true
    # Docs & infra hygiene.
    markdownlint:
      enabled: true
    yamllint:
      enabled: true
    actionlint:
      enabled: true
    shellcheck:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 120000

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
  # Treat the agent rules and project skills as canonical review guidelines.
  code_guidelines:
    enabled: true
    filePatterns:
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".claude/skills/cadbos-*/**"
      - "docs/ai-development/**"
